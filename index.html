<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG Weather Outlook | 4-Day Forecast</title>
    <meta name="description" content="View the real-time 4-day weather outlook for Singapore with detailed temperature, humidity, and wind forecasts.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="alert-banner" class="alert-banner hidden">
        <span class="alert-icon">SYSTEM_ALERT:</span>
        <span id="alert-text">Atmospheric disturbance detected.</span>
    </div>

    <div class="metropolitan-grid">
        <div class="metropolitan-grid-line"></div>
        <div class="metropolitan-grid-line"></div>
        <div class="metropolitan-grid-line"></div>
        <div class="metropolitan-grid-line"></div>
        <div class="metropolitan-grid-line"></div>
        <div class="metropolitan-grid-line"></div>
    </div>

    <main class="container">
        <header>
            <p class="mono accent-glow" style="margin-bottom: 1rem;">Live Telemetry / Singapore</p>
            <h1 id="main-title">Weather<br/>Nova</h1>
            <p class="subtitle">Architectural Climate Intelligence</p>
            
            <div id="status-bar" class="status-bar">
                <div class="status-item" id="status-psi">
                    <span>Index / PSI:</span>
                    <b id="psi-val">--</b>
                </div>
                <div class="status-item" id="status-uv">
                    <span>System / UV:</span>
                    <b id="uv-val">--</b>
                </div>
                <button id="locate-btn" class="status-item highlight">Locate Node</button>
            </div>
            
            <div id="last-updated" class="last-updated">Status: Checking...</div>
        </header>

        <section class="overview-section">
            <div id="map" class="weather-map"></div>
        </section>

        <section id="forecast-container" class="forecast-grid">
            <div class="loader">
                <p>Establishing Link...</p>
            </div>
        </section>

        <footer>
            <p>© 2026 Architectural Climate Intelligence / Data gov.sg</p>
            <div style="display: flex; gap: 2rem;">
                <a href="#" class="mono" style="font-size: 0.6rem;">Archive</a>
                <a href="#" class="mono" style="font-size: 0.6rem;">Protocol</a>
            </div>
        </footer>
    </main>

    <script src="script.js?v=2.0"></script>
</body>
</html>
